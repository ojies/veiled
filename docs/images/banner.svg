<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1f1f" stroke-width="0.6"/>
    </pattern>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>

    <!-- Orange gradient -->
    <linearGradient id="btc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4800A"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text depth -->
    <filter id="text-depth" x="-3%" y="-3%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Accent line gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4800A" stop-opacity="0"/>
      <stop offset="20%" stop-color="#F5A623"/>
      <stop offset="80%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4800A" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="url(#bg)"/>
  <rect width="960" height="320" fill="url(#grid)"/>

  <!-- Logo: concentric broken rings + Bitcoin symbol -->
  <g transform="translate(148, 160)">
    <!-- Broken concentric rings -->
    <g fill="none" stroke-linecap="round">
      <!-- Ring 1 (outermost) -->
      <circle r="130" stroke="#ffffff" stroke-width="3" opacity="0.08"/>
      <path d="M 0,-130 A 130,130 0 0,1 130,0" stroke="#ffffff" stroke-width="4" opacity="0.3"/>
      <path d="M -91.9,-91.9 A 130,130 0 0,0 -130,0" stroke="#ffffff" stroke-width="4" opacity="0.2"/>

      <!-- Ring 2 -->
      <circle r="105" stroke="#ffffff" stroke-width="2.5" opacity="0.07"/>
      <path d="M 105,0 A 105,105 0 0,1 -52.5,90.9" stroke="#ffffff" stroke-width="4" opacity="0.35"/>
      <path d="M -105,0 A 105,105 0 0,1 0,-105" stroke="#ffffff" stroke-width="4" opacity="0.25"/>

      <!-- Ring 3 -->
      <circle r="80" stroke="#ffffff" stroke-width="2" opacity="0.06"/>
      <path d="M 0,80 A 80,80 0 0,1 -80,0" stroke="#ffffff" stroke-width="4.5" opacity="0.4"/>
      <path d="M 56.6,-56.6 A 80,80 0 0,1 80,0" stroke="#ffffff" stroke-width="4.5" opacity="0.3"/>

      <!-- Ring 4 -->
      <circle r="56" stroke="#ffffff" stroke-width="1.5" opacity="0.05"/>
      <path d="M -56,0 A 56,56 0 0,1 56,0" stroke="#ffffff" stroke-width="4.5" opacity="0.45"/>
      <path d="M 39.6,39.6 A 56,56 0 0,1 -39.6,39.6" stroke="#ffffff" stroke-width="4.5" opacity="0.35"/>
    </g>

    <!-- Bitcoin ₿ symbol -->
    <g filter="url(#glow)">
      <!-- Vertical bars -->
      <rect x="-10" y="-32" width="3.5" height="64" rx="1.75" fill="url(#btc-grad)"/>
      <rect x="6.5" y="-32" width="3.5" height="64" rx="1.75" fill="url(#btc-grad)"/>

      <!-- B top lobe -->
      <path d="M -18,-24 L 7,-24 C 19,-24 25,-19 25,-13 C 25,-7 19,-2 7,-2 L -18,-2 Z"
            fill="url(#btc-grad)" opacity="0.95"/>
      <!-- B bottom lobe -->
      <path d="M -18,-4 L 10,-4 C 23,-4 29,2 29,9 C 29,16 23,22 10,22 L -18,22 Z"
            fill="url(#btc-grad)" opacity="0.95"/>
      <!-- Inner cutouts -->
      <path d="M -12,-18 L 5,-18 C 12,-18 16,-16 16,-13 C 16,-10 12,-8 5,-8 L -12,-8 Z"
            fill="#111111"/>
      <path d="M -12,2 L 8,2 C 16,2 20,5 20,9 C 20,13 16,16 8,16 L -12,16 Z"
            fill="#111111"/>
    </g>
  </g>

  <!-- VEILED text -->
  <text x="540" y="182" font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-size="118" font-weight="900" fill="#ffffff" text-anchor="middle"
        letter-spacing="10" filter="url(#text-depth)">VEILED</text>

  <!-- Accent line -->
  <rect x="330" y="208" width="420" height="2.5" rx="1.25" fill="url(#line-grad)"/>

  <!-- Tagline -->
  <text x="540" y="243" font-family="'Segoe UI', 'Arial', 'Helvetica Neue', sans-serif"
        font-size="20" fill="#F5A623" text-anchor="middle"
        letter-spacing="14" font-weight="300">PSEUDONYMOUS  ·  PAYMENTS</text>
</svg>
