<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#333333" stroke-width="0.8"/>
    </pattern>

    <!-- Text shadow for 3D effect -->
    <filter id="text-shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="3" dy="3" stdDeviation="1" flood-color="#000000" flood-opacity="0.7"/>
    </filter>

    <!-- Glow for the Bitcoin symbol -->
    <filter id="btc-glow">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="900" height="300" fill="#0a0a0a"/>

  <!-- Grid overlay -->
  <rect width="900" height="300" fill="url(#grid)"/>

  <!-- Concentric target rings (left side) -->
  <g transform="translate(130, 155)">
    <circle r="110" fill="none" stroke="#d0d0d0" stroke-width="5.5" opacity="0.85"/>
    <circle r="86" fill="none" stroke="#d0d0d0" stroke-width="4.5" opacity="0.75"/>
    <circle r="63" fill="none" stroke="#d0d0d0" stroke-width="4" opacity="0.65"/>
    <circle r="41" fill="none" stroke="#d0d0d0" stroke-width="3.5" opacity="0.55"/>
    <circle r="20" fill="none" stroke="#d0d0d0" stroke-width="3" opacity="0.45"/>

    <!-- Bitcoin symbol in center -->
    <g transform="translate(-18, -30)" filter="url(#btc-glow)">
      <!-- Vertical bars -->
      <rect x="8" y="0" width="4" height="60" rx="2" fill="#E8920B"/>
      <rect x="22" y="0" width="4" height="60" rx="2" fill="#E8920B"/>

      <!-- B shape - top -->
      <path d="M3,10 L24,10 C34,10 38,15 38,22 C38,29 34,32 24,32 L3,32 Z"
            fill="none" stroke="#E8920B" stroke-width="4.5" stroke-linejoin="round"/>

      <!-- B shape - bottom -->
      <path d="M3,30 L26,30 C37,30 42,35 42,42 C42,49 37,53 26,53 L3,53 Z"
            fill="none" stroke="#E8920B" stroke-width="4.5" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- VEILED text -->
  <text x="470" y="185" font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="900" fill="#ffffff" text-anchor="middle"
        letter-spacing="8" filter="url(#text-shadow)">VEILED</text>

  <!-- Orange accent line -->
  <line x1="270" y1="210" x2="670" y2="210" stroke="#E8920B" stroke-width="3"/>

  <!-- Subtitle -->
  <text x="470" y="245" font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="22" fill="#E8920B" text-anchor="middle"
        letter-spacing="12" font-weight="400">PSEUDONYMOUS  ·  PAYMENTS</text>
</svg>
