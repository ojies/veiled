syntax = "proto3";

package registry;

service Registry {
  // Mutations
  rpc RegisterMerchant (MerchantRequest) returns (MerchantResponse);
  rpc CreateSet (CreateSetRequest) returns (CreateSetResponse);
  rpc RegisterBeneficiary (BeneficiaryRequest) returns (BeneficiaryResponse);
  rpc FinalizeSet (FinalizeSetRequest) returns (FinalizeSetResponse);

  // Queries
  rpc GetMerchants (GetMerchantsRequest) returns (GetMerchantsResponse);
  rpc GetCrs (GetCrsRequest) returns (GetCrsResponse);
  rpc GetAnonymitySet (GetAnonymitySetRequest) returns (GetAnonymitySetResponse);
  rpc GetRegistryAddress (GetRegistryAddressRequest) returns (GetRegistryAddressResponse);
  rpc GetFees (GetFeesRequest) returns (GetFeesResponse);

  // Subscriptions
  rpc SubscribeSetFinalization (GetAnonymitySetRequest) returns (stream GetAnonymitySetResponse);
}

// ── Mutations ──────────────────────────────────────────────

message MerchantRequest {
  string name = 1;
  string origin = 2;
  string email = 3;
  string phone = 4;
  bytes funding_txid = 5;  // 32-byte txid of payment tx
  uint32 funding_vout = 6; // output index within payment tx
}

message MerchantResponse {
  string message = 1;
}

message CreateSetRequest {
  uint64 set_id = 1;
  repeated string merchant_names = 2;
  uint32 beneficiary_capacity = 3;
  uint64 sats_per_user = 4;
}

message CreateSetResponse {
  string message = 1;
}

message BeneficiaryRequest {
  uint64 set_id = 1;
  bytes phi = 2; // 33-byte commitment
  string name = 3;
  string email = 4;
  string phone = 5;
  bytes funding_txid = 6;  // 32-byte txid of payment tx
  uint32 funding_vout = 7; // output index within payment tx
}

message BeneficiaryResponse {
  string message = 1;
  uint32 index = 2;
}

message FinalizeSetRequest {
  uint64 set_id = 1;
}

message FinalizeSetResponse {
  string message = 1;
}

// ── Queries ────────────────────────────────────────────────

message GetMerchantsRequest {}

message GetMerchantsResponse {
  repeated MerchantEntry merchants = 1;
}

message MerchantEntry {
  string name = 1;
  string origin = 2;
  bytes credential_generator = 3; // 33-byte compressed pk
}

message GetCrsRequest {
  uint64 set_id = 1;
}

message GetCrsResponse {
  bytes crs_bytes = 1;
}

message GetAnonymitySetRequest {
  uint64 set_id = 1;
}

message GetAnonymitySetResponse {
  repeated bytes commitments = 1; // each 33 bytes
  bool finalized = 2;
  uint32 count = 3;
  uint32 capacity = 4;
}

message GetRegistryAddressRequest {
  uint64 set_id = 1;
}

message GetRegistryAddressResponse {
  string address = 1;       // P2TR bech32m address (bcrt1p... on regtest)
  bytes internal_key = 2;   // 32-byte x-only public key
}

message GetFeesRequest {}

message GetFeesResponse {
  uint64 beneficiary_fee = 1;  // sats required per beneficiary registration
  uint64 merchant_fee = 2;     // sats required per merchant registration
}
