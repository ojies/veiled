<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" width="280" height="56">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="btc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4800A"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Logo mark: rings + Bitcoin symbol -->
  <g transform="translate(28, 28)">
    <!-- Broken rings -->
    <g fill="none" stroke-linecap="round">
      <path d="M 0,-24 A 24,24 0 0,1 24,0" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
      <path d="M -17,-17 A 24,24 0 0,0 -24,0" stroke="#ffffff" stroke-width="1.5" opacity="0.2"/>
      <path d="M 19,0 A 19,19 0 0,1 -9.5,16.5" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>
      <path d="M -19,0 A 19,19 0 0,1 0,-19" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
      <path d="M 0,14 A 14,14 0 0,1 -14,0" stroke="#ffffff" stroke-width="1.8" opacity="0.4"/>
      <path d="M 10,-10 A 14,14 0 0,1 14,0" stroke="#ffffff" stroke-width="1.8" opacity="0.3"/>
    </g>
    <!-- Bitcoin B -->
    <g filter="url(#glow)">
      <rect x="-3.5" y="-9" width="1.2" height="18" rx="0.6" fill="url(#btc-grad)"/>
      <rect x="2" y="-9" width="1.2" height="18" rx="0.6" fill="url(#btc-grad)"/>
      <path d="M -6,-6.5 L 2.5,-6.5 C 6,-6.5 7.5,-5 7.5,-3.5 C 7.5,-2 6,-0.5 2.5,-0.5 L -6,-0.5 Z" fill="url(#btc-grad)"/>
      <path d="M -6,-1 L 3.5,-1 C 7,-1 8.5,0.5 8.5,2.5 C 8.5,4.5 7,6 3.5,6 L -6,6 Z" fill="url(#btc-grad)"/>
      <path d="M -4,-5 L 2,-5 C 4,-5 5,-4.3 5,-3.5 C 5,-2.7 4,-2 2,-2 L -4,-2 Z" fill="#0c0c0c"/>
      <path d="M -4,0.5 L 3,0.5 C 5,0.5 6,1.3 6,2.5 C 6,3.7 5,4.5 3,4.5 L -4,4.5 Z" fill="#0c0c0c"/>
    </g>
  </g>

  <!-- VEILED text -->
  <text x="58" y="36" font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-size="28" font-weight="900" fill="#ffffff" letter-spacing="3">VEILED</text>
</svg>
