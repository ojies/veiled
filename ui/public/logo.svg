<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Outer glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle inner shadow on background -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <!-- Orange gradient for Bitcoin symbol -->
    <linearGradient id="btc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4800A"/>
    </linearGradient>

    <!-- Ring gradient (fades outward) -->
    <radialGradient id="ring-fade" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg-grad)"/>

  <!-- Concentric rings - broken/partial to suggest "veiling" -->
  <g transform="translate(256, 256)" fill="none" stroke-linecap="round">
    <!-- Ring 1 (outermost) - broken arc -->
    <circle r="210" stroke="#ffffff" stroke-width="4" opacity="0.12"/>
    <path d="M 0,-210 A 210,210 0 0,1 210,0" stroke="#ffffff" stroke-width="5" opacity="0.35"/>
    <path d="M -148.5,-148.5 A 210,210 0 0,0 -210,0" stroke="#ffffff" stroke-width="5" opacity="0.25"/>

    <!-- Ring 2 -->
    <circle r="170" stroke="#ffffff" stroke-width="3.5" opacity="0.1"/>
    <path d="M 170,0 A 170,170 0 0,1 -85,147.2" stroke="#ffffff" stroke-width="5" opacity="0.4"/>
    <path d="M -170,0 A 170,170 0 0,1 0,-170" stroke="#ffffff" stroke-width="5" opacity="0.3"/>

    <!-- Ring 3 -->
    <circle r="130" stroke="#ffffff" stroke-width="3" opacity="0.08"/>
    <path d="M 0,130 A 130,130 0 0,1 -130,0" stroke="#ffffff" stroke-width="5.5" opacity="0.45"/>
    <path d="M 91.9,-91.9 A 130,130 0 0,1 130,0" stroke="#ffffff" stroke-width="5.5" opacity="0.35"/>

    <!-- Ring 4 (inner) -->
    <circle r="92" stroke="#ffffff" stroke-width="2.5" opacity="0.06"/>
    <path d="M -92,0 A 92,92 0 0,1 92,0" stroke="#ffffff" stroke-width="5.5" opacity="0.5"/>
    <path d="M 65,65 A 92,92 0 0,1 -65,65" stroke="#ffffff" stroke-width="5.5" opacity="0.4"/>
  </g>

  <!-- Bitcoin ₿ symbol (centered, properly formed) -->
  <g transform="translate(256, 256)" filter="url(#glow)">
    <!-- Vertical strike-through bars (extends above and below the B) -->
    <rect x="-16" y="-52" width="5.5" height="104" rx="2.75" fill="url(#btc-grad)"/>
    <rect x="10.5" y="-52" width="5.5" height="104" rx="2.75" fill="url(#btc-grad)"/>

    <!-- B body - top lobe -->
    <path d="M -28,-38 L 12,-38 C 30,-38 40,-30 40,-20 C 40,-10 30,-3 12,-3 L -28,-3 Z"
          fill="url(#btc-grad)" opacity="0.95"/>

    <!-- B body - bottom lobe (wider) -->
    <path d="M -28,-6 L 16,-6 C 36,-6 47,3 47,15 C 47,27 36,36 16,36 L -28,36 Z"
          fill="url(#btc-grad)" opacity="0.95"/>

    <!-- Inner cutouts to make it look like a proper B -->
    <path d="M -18,-28 L 10,-28 C 20,-28 26,-24 26,-20 C 26,-16 20,-13 10,-13 L -18,-13 Z"
          fill="#151515"/>
    <path d="M -18,4 L 14,4 C 26,4 33,9 33,15 C 33,21 26,26 14,26 L -18,26 Z"
          fill="#151515"/>
  </g>

  <!-- Subtle "V" notch cut into bottom of outer ring area (veil hint) -->
  <path d="M 206,420 L 256,380 L 306,420" fill="none" stroke="#F5A623" stroke-width="3" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
